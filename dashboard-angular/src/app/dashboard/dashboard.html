<div class="gridster-container">
  <gridster [options]="options">
    <gridster-item
      [item]="item"
      *ngFor="let item of dashboard; trackBy: trackByFn"
      class="gridster-item">
      <div class="item-content">
        <div class="item-header">
          <h3
            *ngIf="!item.isEditingTitle"
            (click)="options.draggable?.enabled && toggleEditMode(item, 'title', true)">
            {{ item.title }}
          </h3>
          <input
            *ngIf="item.isEditingTitle"
            [(ngModel)]="item.title"
            (blur)="toggleEditMode(item, 'title', false)"
            (keydown.enter)="toggleEditMode(item, 'title', false)"
            class="edit-input"
            type="text"
            #titleInput>
          <button
            class="remove-btn"
            (click)="removeItem(item)"
            title="Удалить элемент">
            x
          </button>
        </div>
        <div class="item-body">
          <p
            *ngIf="!item.isEditingContent"
            (click)="options.draggable?.enabled && toggleEditMode(item, 'content', true)">
            {{ item.content }}
          </p>
          <textarea
            *ngIf="item.isEditingContent"
            [(ngModel)]="item.content"
            (blur)="toggleEditMode(item, 'content', false)"
            class="edit-textarea"
            #contentInput>
          </textarea>
        </div>
      </div>
  </gridster-item>
</gridster>

<div class="controls">
  <button
    class="add-btn"
    (click)="addItem()"
    title="Добавить элемент">
    + Добавить элемент
  </button>
  <button
    class="toggle-btn"
    (click)="toggleDragResize()"
    [class.active]="!options.draggable?.enabled">
    {{ options.draggable?.enabled ? 'Заблокировать' : 'Разблокировать' }}
  </button>
</div>
</div>
