<h1>Dashboard</h1>
<div class="gridster-container">
  <gridster [options]="options">
    <gridster-item
    [item]="item"
    *ngFor="let item of dashboard; trackBy: trackByFn"
    class="gridster-item">
    <div class="item-content">
      <div class="item-header">
        <h3>{{ item.title }}</h3>
        <button
        class="remove-btn"
        (click)="removeItem(item)"
        title="Удалить элемент">
        x
      </button>
    </div>
    <div class="item-body">
      <p>{{ item.content }}</p>
    </div>
  </div>
</gridster-item>
</gridster>

<div class="controls">
  <button
  class="add-btn"
  (click)="addItem()"
  title="Добавить элемент">
  + Добавить элемент
</button>
<button
class="toggle-btn"
(click)="toggleDragResize()"
[class.active]="!options.draggable?.enabled">
{{ options.draggable?.enabled ? 'Заблокировать' : 'Разблокировать' }}
</button>
</div>
</div>

<app-side-bar><app-side-bar/>
