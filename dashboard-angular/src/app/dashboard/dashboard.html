<app-header></app-header>
<gridster [options]="options" class="gridster">
  <gridster-item [item]="item" *ngFor="let item of dashboard;" class="gridster-item">
    <button
      *ngIf="!isLocked"
      class="remove-btn"
      (click)="removeItem(item)"
      title="Удалить элемент">
      x
    </button>
    <div class="gridster-item-content">
      <app-text-block
        *ngIf="item.type === 'text'"
        [item]="item"
        [isLocked]="isLocked"
        (onRemove)="removeItem($event)">
        
      </app-text-block>

      <div *ngIf="item.type === 'chart'" class="chart-container">
        <app-chart 
          [chartType]="'scatter'"
          [data]="item.data"
          [isLocked]="isLocked"
          >
        </app-chart>
      </div>
    </div>
  </gridster-item>
</gridster>
