<div 
  class="upload-container"
  [class.locked]="isLocked"
  [class.has-image]="item.file"
  tabindex="0">

  <input 
    type="file"
    accept="image/png, image/jpeg, image/webp"
    (change)="onFileSelected($event)"
    hidden
    #fileInput />

  <div class="upload-box" *ngIf="!item.file">
    <div class="icon">&#8682;</div>
    <div class="text">
      Вставьте фото (Ctrl+V) <br>или<br>
    </div>
    <button class="upload-button" (click)="fileInput.click()">Выбрать файл</button>
    <div class="file-types-line">PNG / JPEG / WEBP</div>
  </div>

  <img 
    *ngIf="item.file"
    [src]="imageUrl"
    class="preview"
    (click)="focusContainer()"/>
</div>
