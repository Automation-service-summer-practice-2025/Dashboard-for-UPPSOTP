<div class="chart-container">
  <div class="chart-header">
    <h3>{{item.title}}</h3>
  </div>
    
  <div class="chart-content">
    <div class="chart-wrapper" *ngIf="item.data; else uploadTemplate">
      <canvas baseChart
          [data]="item.data"
          [options]="chartOptions"
          type="scatter">
      </canvas>
    </div>
    <ng-template #uploadTemplate>
      <app-scatter-upload 
          (fileLoaded)="onDataLoaded($event)" 
          [isLocked]="isLocked">
      </app-scatter-upload>
    </ng-template>
  </div>
</div>
