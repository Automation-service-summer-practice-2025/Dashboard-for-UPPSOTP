<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #sidenav
    mode="side"
    position="start"
    [fixedInViewport]="true"
    [style.width.px]="300"
    class="no-scroll">
    <div class="sidebar-content">
      <div class="user-block">
        <mat-icon class="user-icon">account_circle</mat-icon>
        <div class="user-role">Админ</div>
        <mat-button-toggle-group
          [value]="isLocked ? 'locked' : 'edit'"
          (change)="onToggleMode($event)"
          exclusive
          class="lock-toggle-group small-toggle">
          <mat-button-toggle value="locked" aria-label="Только просмотр">
            <mat-icon>visibility</mat-icon>
          </mat-button-toggle>
          <mat-button-toggle value="edit" aria-label="Редактирование">
            <mat-icon>edit</mat-icon>
          </mat-button-toggle>
        </mat-button-toggle-group>
      </div>

      <mat-divider class="divider"></mat-divider>

      <h3 class="constructor-title">Конструктор</h3>

      <div class="constructor-buttons">
        <button mat-raised-button class="constructor-button" (click)="addTextBlock()" [disabled]="isLocked">
          <mat-icon>text_fields</mat-icon>
          Текст
        </button>

        <button mat-raised-button class="constructor-button" [disabled]="isLocked">
          <mat-icon>image</mat-icon>
          Картинка
        </button>

        <button mat-raised-button class="constructor-button" (click)="addChart()" [disabled]="isLocked">
          <mat-icon>bar_chart</mat-icon>
          Добавить график
        </button>
        
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <button
      mat-icon-button
      class="menu-toggle"
      [style.left.px]="sidenav.opened ? 310 : 10"
      (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
