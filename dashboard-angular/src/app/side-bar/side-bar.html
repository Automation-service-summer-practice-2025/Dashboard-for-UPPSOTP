<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav
               mode="side"
               position="start"
               [fixedInViewport]="true"
               [style.width.px]="300"
               class="no-scroll">
    <div class="sidebar-content">
      <div class="user-block">
        <mat-icon class="user-icon">account_circle</mat-icon>
        <div class="user-role">Админ</div>
      </div>

      <button mat-raised-button color="primary" class="login-button">
        Войти
      </button>

      <mat-divider class="divider"></mat-divider>

      <h3 class="constructor-title">Конструктор дашборда</h3>

      <div class="constructor-buttons">
        <button mat-stroked-button class="constructor-button" (click)="addTextBlock()">
          <mat-icon>text_fields</mat-icon>
          Добавить текстовый блок
        </button>

        <button mat-stroked-button class="constructor-button">
          <mat-icon>image</mat-icon>
          Добавить изображение
        </button>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <button mat-icon-button
            class="menu-toggle"
            [style.left.px]="sidenav.opened ? 310 : 10"
            (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
