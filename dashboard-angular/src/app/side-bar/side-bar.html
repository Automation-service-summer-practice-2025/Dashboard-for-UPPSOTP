<mat-sidenav-container>
  <mat-sidenav
    #sidenav
    mode="side"
    position="start"
    [fixedInViewport]="true"
    [style.width.px]="width"
    class="no-scroll">
    <div class="sidebar-content">
      <div class="user-block">
        <div class="user-role">
          <mat-icon>account_circle</mat-icon>
          <a>Админ</a>
        </div>
        <mat-button-toggle-group
          [value]="isLocked ? 'locked' : 'edit'"
          (change)="onToggleMode($event)"
          exclusive
          class="lock-toggle-group">
          <mat-button-toggle value="locked" aria-label="Только просмотр">
            <mat-icon>visibility</mat-icon>
          </mat-button-toggle>
          <mat-button-toggle value="edit" aria-label="Редактирование">
            <mat-icon>edit</mat-icon>
          </mat-button-toggle>
        </mat-button-toggle-group>
      </div>

      <mat-divider class="divider"></mat-divider>

      <h3 class="constructor-title">Конструктор</h3>

      <div class="constructor-buttons">
        <button mat-raised-button class="constructor-button" (click)="addTextBlock()" [disabled]="isLocked">
          <mat-icon>text_fields</mat-icon>
          Текст
        </button>

        <button mat-raised-button class="constructor-button" (click)="addImageBlock()" [disabled]="isLocked">
          <mat-icon>image</mat-icon>
          Картинка
        </button>

        <button mat-raised-button class="constructor-button" (click)="addScatterChart()" [disabled]="isLocked">
          <mat-icon>scatter_plot</mat-icon>
          Точечный график
        </button>

        <button mat-raised-button class="constructor-button" (click)="addHistogramChart()" [disabled]="isLocked">
          <mat-icon>bar_chart</mat-icon>
          Гистограмма
        </button>
      </div>
    </div>
    <div
      class="resize-handle"
      (mousedown)="onResizeStart($event)">
    </div>
  </mat-sidenav>

  <mat-sidenav-content [style.margin-left.px]="sidenav.opened ? width : 0">
    <button
      mat-icon-button
      class="menu-toggle"
      [style.left.px]="sidenav.opened ? width + 10 : 10"
      (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
