<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Газпромнефть Автоматика-Сервис</title>
</head>
<body>
    <div class="header">
        <div class="logo-block">
            <img src="assets/image/logo_avsv.svg" alt="Газпромнефть" class="logo">
            <div class="company-name">
                ГАЗПРОМНЕФТЬ
                АВТОМАТИКА-СЕРВИС
            </div>
        </div>
        <div class="menu-icon">&#9776;</div>
    </div>
    <div class="center-box">
        <h1>Вход</h1>
        <div class="form-group">
            <label for="email">Почта</label>
            <input type="text" id="email" value="email@gmail.com">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" value="password">
        </div>
        <button class="btn-login">Вход</button>
        <button class="btn-skip">Пропустить</button>
    </div>
</body>
</html>
